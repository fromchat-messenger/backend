# Local LiveKit SFU for FromChat development (native `npm run livekit:run`).
# Match keys in .env (npm run generate:env). Docker compose passes them via LIVEKIT_KEYS.
port: 8303

rtc:
  tcp_port: 8304
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  fromchat_dev: "local_dev_secret_must_be_at_least_32_characters_long"
